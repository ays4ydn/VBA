<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VBA | Developer Portfolio</title>
    <link rel="stylesheet" href="./portfolio_assets/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <main class="container">
        <!-- Profile Picture: Stage 1 (User Original) -->
        <div class="profile-img-container">
            <img src="./depo/image.png" alt="Profil 1" class="profile-img">
        </div>

        <!-- Badge -->
        <div class="badge">
            <span class="badge-dot"></span>
            Open to Collaboration
        </div>

        <!-- Hero Content -->
        <h1 class="main-title">
            VBA <span class="highlight">PORTFOLIO</span>
        </h1>
        <p class="subtitle">Artificial Intelligence • Interactive Design • Web Specialist</p>

        <!-- Glass UI Stage 1 -->
        <div class="glass-container">
            <div class="stats-row">
                <div class="stat-item">
                    <span class="stat-value">5+</span>
                    <span class="stat-label">Years XP</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">50+</span>
                    <span class="stat-label">Projects</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">24/7</span>
                    <span class="stat-label">Support</span>
                </div>
            </div>

            <div class="button-grid">
                <button class="monster-btn" id="start-btn">DataCity Dünyasına Gir</button>
            </div>
        </div>
    </main>

    <!-- Stage 2: Hogwarts / Dragon Scene -->
    <div id="stage2-container" class="hogwarts-scene" style="display: none; opacity: 0; pointer-events: none;">
        <!-- Profile Picture: Stage 2 (User Original) -->
        <div class="profile-img-container stage2-profile">
            <img src="./depo/image2.png" alt="Profil 2" class="profile-img">
        </div>
        <!-- Ejderha Kütüphanesi İptal Edildi: Sadece Buton Kaldı -->
        
        <div class="castle-background">
            <img src="./portfolio_assets/hogwarts.png" alt="Hogwarts" class="hogwarts-castle">
            
            <!-- Harry Potter Sprite -->
            <div id="harry-potter-toy" class="harry-sprite walking">
                <img src="./portfolio_assets/harry_transparent.png" alt="Harry">
                <!-- Harry Konuşma Balonu -->
                <div id="harry-bubble" class="speech-bubble harry-speech">
                    Hogwarts'a Hoş Geldin! ⚡
                </div>
            </div>
        </div>

        <div class="stage2-ui">
            <h2 class="stage2-title">Hogwarts Kütüphanesi</h2>
            <div class="dragon-btns">
                <button class="monster-btn explorer-btn" id="explore-btn">Gizli Dosyaları Keşfet</button>
            </div>
        </div>
    </div>

    <!-- Stamina Cat Elements (Sir Elton & Madonna) -->
    <div id="sir-elton" class="pet-cat" style="display: none;">
        <div class="cat-body">🐱</div>
    </div>
    <div id="madonna" class="pet-cat" style="display: none;">
        <div class="cat-body">🐈</div>
    </div>

    <script src="./portfolio_assets/script.js"></script>
</body>
</html>
