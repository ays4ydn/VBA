<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proje Portali</title>
    <link rel="stylesheet" href="./portfolio_assets/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <main class="container">
        <!-- Profile Picture: Stage 1 (User Original) -->
        <div class="profile-img-container">
            <img src="./depo/image.png" alt="Profil 1" class="profile-img">
        </div>

        <!-- Badge -->
        <div class="badge">
            <span class="star">✦</span> VBA PROJE PORTFÖYÜ <span class="star">✦</span>
        </div>

        <!-- Title -->
        <h1 class="main-title">VBA</h1>
        
        <!-- Subtitle -->
        <p class="subtitle">İnteraktif araçlar, görsel araştırmalar & deneyimler</p>

        <!-- Main Button (DataCity) -->
        <a href="javascript:void(0)" id="main-transition-btn" class="primary-btn">
            <i class="fa-solid fa-sun icon-pulse"></i> DataCity Dünyasına Gir <i class="fa-solid fa-arrow-right"></i>
        </a>

        <!-- Secondary Buttons (Grafik & Data) -->
        <div class="secondary-btns">
            <a href="./gorsellestirme.png" target="_blank" class="sec-btn">
                <i class="fa-solid fa-chart-line"></i> Grafik
            </a>
            <a href="./data.csv" target="_blank" class="sec-btn">
                <i class="fa-solid fa-database"></i> Data
            </a>
        </div>
    </main>

    <!-- STAGE 2: HOGWARTS & EJDERHA BOYUTU -->
    <div id="stage2-container" class="hogwarts-scene" style="opacity: 0; pointer-events: none;">
        <!-- Profile Picture: Stage 2 (User Original) -->
        <div class="profile-img-container stage2-profile">
            <img src="./depo/image2.png" alt="Profil 2" class="profile-img">
        </div>
        <!-- Ejderha Kütüphanesi İptal Edildi: Sadece Buton Kaldı -->
        
        <!-- MERKEZİ BUTON -->
        <a href="#" id="explore-btn" class="hidden-explore-btn">Keşfetmeye Var mısın?</a>

        <!-- Sihirli Menü Kutucukları ve Oyuncak Harry -->
        <div class="monster-buttons-wrapper">
            <div id="harry-potter-toy" onclick="mountBroom()">
                <div class="harry-torso">
                    <img src="./portfolio_assets/harry_transparent.png" alt="Torso">
                </div>
                <div class="harry-legs">
                    <img src="./portfolio_assets/harry_transparent.png" alt="Legs">
                </div>
                <div id="harry-bubble">Buraya gel, bin şuna! 🧹 (Tıkla!)</div>
            </div>
            
            <div class="monster-buttons">
                <a href="./DataCity/index.html" class="monster-btn">
                    DataCity Dünyasına Gir
                </a>
                <a href="./gorsellestirme.png" target="_blank" class="monster-btn">
                    Grafik Ekranı
                </a>
                <a href="./data.csv" target="_blank" class="monster-btn">
                    Saf Veri (CSV)
                </a>
            </div>
        </div>
    </div>

    <footer>
        PORTFOLYO &bull; 2026 &bull; Tüm hakları saklıdır
    </footer>

    <script src="./portfolio_assets/script.js"></script>
</body>
</html>
